global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
      continue: true
    - matchers:
        - severity="warning"
      receiver: email-warning

receivers:
  - name: default

  - name: slack-critical
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/THIS/WITH_YOUR_WEBHOOK"
        channel: "#alerts"
        send_resolved: true
        title: "[SGI-LIB] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}{{ end }}"

  - name: email-warning
    email_configs:
      - to: "alerts@example.com"
        from: "sgi-lib-alerts@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "smtp-user"
        auth_password: "smtp-password"
        require_tls: true
        send_resolved: true
