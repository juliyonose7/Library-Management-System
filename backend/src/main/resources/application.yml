spring:
  application:
    name: sgi-lib-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sgi_lib}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:change-me-db-password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    secret: ${JWT_SECRET:change-me-jwt-secret-min-32-characters}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 1209600000

app:
  bootstrap:
    admin:
      username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@sgilib.dev}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}

integration:
  google-books:
    enabled: true
